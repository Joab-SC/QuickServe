<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${accion} + ' Producto — La Mesa Sobria'">Producto</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">La Mesa <span>Sobria</span></a>
  <div class="navbar-links">
    <a href="/">Dashboard</a>
    <a th:href="@{/pedidos/registrar}">Nuevo Pedido</a>
    <a th:href="@{/pedidos}">Pedidos</a>
    <a th:href="@{/productos}" class="active">Productos</a>
    <a th:href="@{/cocina}">Cocina</a>
    <a th:href="@{/mesero}">Mesero
      <span class="notif-badge" th:if="${notificaciones > 0}" th:text="${notificaciones}"></span>
    </a>
  </div>
</nav>

<div class="container">
  <div class="flex-between page-header">
    <div>
      <h1 th:text="${accion} + ' Producto'"></h1>
      <p th:if="${accion == 'Editar'}" th:text="'Modificando: ' + ${producto.nombre}"></p>
      <p th:unless="${accion == 'Editar'}">Nuevo ítem para el menú</p>
    </div>
    <a th:href="@{/productos}" class="btn btn-secondary">← Cancelar</a>
  </div>

  <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

  <div style="max-width:560px">
    <div class="card">
      <!-- Crear -->
      <form th:if="${accion == 'Crear'}" th:action="@{/productos/crear}" method="post">
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input type="text" name="nombre" class="form-control" required
                 placeholder="Ej: Bandeja Paisa" th:value="${producto.nombre}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <textarea name="descripcion" class="form-control" rows="2"
                    placeholder="Breve descripción del plato…"
                    th:text="${producto.descripcion}"></textarea>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Precio (COP) *</label>
            <input type="number" name="precio" class="form-control" required
                   min="0" step="500" placeholder="25000" th:value="${producto.precio}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Tipo *</label>
            <select name="tipo" class="form-control">
              <option th:each="t : ${tipos}" th:value="${t.name()}" th:text="${t.label}"
                      th:selected="${producto.tipo != null and producto.tipo == t}"></option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer">
            <input type="checkbox" name="disponible" style="width:16px;height:16px;accent-color:var(--accent)"
                   th:checked="${producto.disponible == null or producto.disponible}"/>
            <span class="form-label" style="margin:0">Disponible en el menú</span>
          </label>
        </div>
        <hr class="divider"/>
        <div class="flex-end">
          <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">Crear Producto</button>
        </div>
      </form>

      <!-- Editar -->
      <form th:unless="${accion == 'Crear'}" th:action="@{/productos/{id}/editar(id=${producto.id})}" method="post">
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input type="text" name="nombre" class="form-control" required th:value="${producto.nombre}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <textarea name="descripcion" class="form-control" rows="2"
                    th:text="${producto.descripcion}"></textarea>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Precio (COP) *</label>
            <input type="number" name="precio" class="form-control" required
                   min="0" step="500" th:value="${producto.precio}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Tipo *</label>
            <select name="tipo" class="form-control">
              <option th:each="t : ${tipos}" th:value="${t.name()}" th:text="${t.label}"
                      th:selected="${producto.tipo == t}"></option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer">
            <input type="checkbox" name="disponible" style="width:16px;height:16px;accent-color:var(--accent)"
                   th:checked="${producto.disponible}"/>
            <span class="form-label" style="margin:0">Disponible en el menú</span>
          </label>
        </div>
        <hr class="divider"/>
        <div class="flex-end">
          <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
