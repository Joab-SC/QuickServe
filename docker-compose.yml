version: '3.1'

services:
  db:
    image: postgres:15          # usa la versión 15, estable
    ports:
      - "5433:5432"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changemeinprod   # esta contraseña será la que uses en Spring Boot
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: